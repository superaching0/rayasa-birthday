<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Letter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Instrument+Serif:ital@0;1&family=Irish+Grover&family=Ranchers&family=Slackey&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/envelope.css">
    
</head>
<body>
<div class="envlope-wrapper">
      <div id="envelope" class="close">
        <div class="front flap"></div>
        <div class="front pocket"></div>
        <div class="letter">
          <div class="words line1">To: My Baby Ucing</div>
          <div class="words line2">Dear Rayasa, thank you for coming to this life.</div>
          <div class="words line3">I hope this world treats you soooo well, baby.</div>
          <div class="words line4">I hope you always find reasons to live this life.</div>
          <div class="words line5">Thank you for surviving until this very moment.</div>
          <div class="words line6">Happy birthday, love.</div>
        </div>
        <div class="hearts">
          <div class="heart a1"></div>
          <div class="heart a2"></div>
          <div class="heart a3"></div>
        </div>
      </div>
    </div>
    <div class="reset">
      <button id="open">Open</button>
      <!-- <button id="reset">Close</button> -->
       <a href="birthday.html"><button>Next</button></a>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="/script.js"></script>
    
</body>
</html>
